<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" role="img" aria-label="FutureKawa vertical logo">
  <defs>
    <style>
      .logo-text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-weight: 700; fill: #5b2e1a; }
      .logo-dino { fill: #5b2e1a; }
      .logo-cup { fill: #5b2e1a; }
    </style>
  </defs>
  
  <rect width="100%" height="100%" fill="none"/>
  
  <!-- Coffee Cup -->
  <g transform="translate(30, 10)">
    <!-- Cup body -->
    <path class="logo-cup" d="M15 15 L15 85 Q15 95 25 95 L95 95 Q105 95 105 85 L105 15 Z" stroke="#5b2e1a" stroke-width="1.5" fill="none"/>
    <!-- Cup fill -->
    <path class="logo-cup" d="M20 20 L20 85 Q20 90 25 90 L95 90 Q100 90 100 85 L100 20 Z" opacity="0.25"/>
    <!-- Handle -->
    <path class="logo-cup" d="M105 30 Q140 30 140 55 Q140 80 105 80" stroke="#5b2e1a" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Coffee steam -->
    <path d="M33 5 Q33 -2 42 -5 Q51 -8 51 2" stroke="#8a6b5a" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M70 5 Q70 -2 79 -5 Q88 -8 88 2" stroke="#8a6b5a" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- Dragon/Dinosaur Icon -->
  <g transform="translate(50, 130)">
    <!-- Head -->
    <ellipse class="logo-dino" cx="50" cy="45" rx="35" ry="40"/>
    <!-- Snout -->
    <path class="logo-dino" d="M85 35 L120 30 Q135 30 135 45 Q135 60 120 60 L85 50 Z"/>
    <!-- Eye 1 -->
    <circle cx="65" cy="25" r="6" fill="white"/>
    <circle cx="67" cy="23" r="3" fill="#5b2e1a"/>
    <!-- Eye 2 -->
    <circle cx="85" cy="15" r="5" fill="white" opacity="0.7"/>
    <circle cx="86" cy="14" r="2.5" fill="#5b2e1a" opacity="0.7"/>
    <!-- Nostrils -->
    <circle cx="115" cy="38" r="3" fill="#3d1f14"/>
    <circle cx="115" cy="50" r="3" fill="#3d1f14"/>
    <!-- Horn/Spikes -->
    <path class="logo-dino" d="M40 -5 L35 -25 L45 -15 Z"/>
    <path class="logo-dino" d="M65 -10 L60 -30 L70 -20 Z"/>
    <path class="logo-dino" d="M85 -5 L80 -25 L90 -15 Z"/>
    <!-- Jaw detail -->
    <path class="logo-dino" d="M15 80 Q50 100 95 90" stroke="#3d1f14" stroke-width="2" fill="none" opacity="0.4"/>
    <!-- Spots/Texture -->
    <ellipse cx="45" cy="55" rx="8" ry="10" fill="white" opacity="0.15"/>
    <ellipse cx="70" cy="60" rx="7" ry="9" fill="white" opacity="0.15"/>
    <ellipse cx="90" cy="48" rx="6" ry="8" fill="white" opacity="0.15"/>
  </g>
  
  <!-- Text -->
  <text class="logo-text" x="100" y="280" font-size="24" font-weight="700" text-anchor="middle">FutureKawa</text>
  <text x="100" y="305" fill="#8a6b5a" font-size="10" font-weight="500" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" text-anchor="middle">Coffee Intelligence</text>
</svg>
