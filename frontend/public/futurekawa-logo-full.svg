<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-label="FutureKawa logo">
  <defs>
    <style>
      .logo-text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-weight: 700; fill: #5b2e1a; }
      .logo-dino { fill: #5b2e1a; }
      .logo-cup { fill: #5b2e1a; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="none"/>
  
  <!-- Coffee Cup (Left) -->
  <g transform="translate(40, 80)">
    <!-- Cup body -->
    <path class="logo-cup" d="M20 20 L20 140 Q20 160 40 160 L140 160 Q160 160 160 140 L160 20 Z" stroke="#5b2e1a" stroke-width="2" fill="none"/>
    <!-- Cup fill -->
    <path class="logo-cup" d="M28 30 L28 140 Q28 152 40 152 L140 152 Q152 152 152 140 L152 30 Z" opacity="0.3"/>
    <!-- Handle -->
    <path class="logo-cup" d="M160 50 Q200 50 200 90 Q200 130 160 130" stroke="#5b2e1a" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Coffee steam -->
    <path d="M45 15 Q45 5 55 0 Q65 -5 65 5" stroke="#8a6b5a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M85 15 Q85 5 95 0 Q105 -5 105 5" stroke="#8a6b5a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M125 15 Q125 5 135 0 Q145 -5 145 5" stroke="#8a6b5a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- Dragon/Dinosaur Icon (Right) -->
  <g transform="translate(310, 40)">
    <!-- Head -->
    <ellipse class="logo-dino" cx="60" cy="50" rx="45" ry="50"/>
    <!-- Snout -->
    <path class="logo-dino" d="M105 40 L140 35 Q150 35 150 45 Q150 55 140 55 L105 50 Z"/>
    <!-- Eye 1 -->
    <circle cx="70" cy="35" r="6" fill="white"/>
    <circle cx="72" cy="33" r="3" fill="#5b2e1a"/>
    <!-- Eye 2 -->
    <circle cx="90" cy="25" r="5" fill="white" opacity="0.7"/>
    <circle cx="91" cy="24" r="2.5" fill="#5b2e1a" opacity="0.7"/>
    <!-- Nostrils -->
    <circle cx="135" cy="40" r="3" fill="#3d1f14"/>
    <circle cx="135" cy="50" r="3" fill="#3d1f14"/>
    <!-- Horn/Spikes -->
    <path class="logo-dino" d="M50 0 L45 -20 L55 -15 Z"/>
    <path class="logo-dino" d="M70 -5 L65 -25 L75 -20 Z"/>
    <path class="logo-dino" d="M90 0 L85 -20 L95 -15 Z"/>
    <!-- Jaw detail -->
    <path class="logo-dino" d="M20 90 Q60 110 100 100" stroke="#3d1f14" stroke-width="2" fill="none" opacity="0.4"/>
    <!-- Spots/Texture -->
    <ellipse cx="50" cy="60" rx="8" ry="10" fill="white" opacity="0.15"/>
    <ellipse cx="75" cy="65" rx="7" ry="9" fill="white" opacity="0.15"/>
    <ellipse cx="95" cy="55" rx="6" ry="8" fill="white" opacity="0.15"/>
  </g>
  
  <!-- Text -->
  <g transform="translate(260, 240)">
    <text class="logo-text" x="0" y="0" font-size="48" font-weight="700">FutureKawa</text>
    <text x="0" y="40" fill="#8a6b5a" font-size="16" font-weight="500" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">Système de suivi des stocks de café</text>
  </g>
</svg>
